<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Brain ROI Study</title>
    <link rel="stylesheet" href="./brain-viewer.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body data-viewer-mode="study">
    <main class="brain-app">
      <section class="viewer-stage" aria-label="3D brain ROI study viewer">
        <canvas id="brain-canvas"></canvas>
        <div class="topbar">
          <a class="icon-link" href="./index.html" aria-label="실험 화면으로 돌아가기" title="실험 화면으로 돌아가기">
            <span aria-hidden="true">←</span>
          </a>
          <div>
            <p class="eyebrow">AAL ROI Study</p>
            <h1>Study Brain Regions</h1>
          </div>
          <button id="reset-camera" class="icon-button" type="button" aria-label="카메라 초기화" title="카메라 초기화">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
        <div id="tooltip" class="roi-tooltip hidden"></div>
      </section>

      <aside class="control-panel" aria-label="Brain ROI study controls">
        <nav class="page-tabs" aria-label="Brain viewer pages">
          <a class="active" href="./brain-study.html">공부하기</a>
          <a href="./brain-viewer.html">퀴즈 풀기</a>
        </nav>

        <div class="state-block">
          <p class="eyebrow">Selected ROI</p>
          <h2 id="state-title"></h2>
          <p id="state-summary" class="state-summary"></p>
        </div>

        <div class="segmented-control roi-buttons" id="study-roi-buttons" aria-label="ROI 선택"></div>

        <section class="roi-list-section">
          <div class="section-head">
            <h3>ROI Guide</h3>
          </div>
          <div id="study-roi-details" class="study-details"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./brain-viewer.js"></script>
  </body>
</html>
