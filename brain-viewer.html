<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Brain State ROI Viewer</title>
    <link rel="stylesheet" href="./brain-viewer.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body data-viewer-mode="student">
    <main class="brain-app">
      <section class="viewer-stage" aria-label="3D brain ROI activation viewer">
        <canvas id="brain-canvas"></canvas>
        <div class="topbar">
          <div>
            <p class="eyebrow">MNI ROI Pattern Quiz</p>
            <h1>Guess the Brain State</h1>
          </div>
          <button id="reset-camera" class="icon-button" type="button" aria-label="카메라 초기화" title="카메라 초기화">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
        <div id="tooltip" class="roi-tooltip hidden"></div>
      </section>

      <aside class="control-panel" aria-label="Brain viewer controls">
        <nav class="page-tabs" aria-label="Brain viewer pages">
          <a href="./brain-study.html">공부하기</a>
          <a class="active" href="./brain-viewer.html">퀴즈 풀기</a>
        </nav>

        <div class="state-block">
          <p class="eyebrow">Current Case</p>
          <h2 id="state-title"></h2>
          <p id="state-summary" class="state-summary"></p>
        </div>

        <div class="segmented-control" id="state-buttons" aria-label="상태 선택"></div>

      </aside>
    </main>

    <script type="module" src="./brain-viewer.js"></script>
  </body>
</html>
